{% set version = "1.3.3" %}
{% set name = "cvxopt" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  - url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
    sha256: 8059cef41f1f115c87bc9b75fec9f86db95e7f0afcf03a52d619ba433e443bcb


build:
  number: 2
  # mkl is incompatible with GPL
  skip: true  # [blas_impl == 'mkl']
  ignore_run_exports:  # [win]
    - glpk  # [win]

requirements:
  build:
    - {{ stdlib('c') }}
    - {{ compiler('c') }}
  host:
    - python
    - setuptools >=64
    - setuptools-scm >=8
    - pip
    - dsdp 5.8
    - fftw {{ fftw }}
    - glpk {{ glpk }}
    - gsl {{ gsl }}
    - openblas-devel {{ openblas_devel }}  # [blas_impl == "openblas"]
    - suitesparse {{ suitesparse }}
  run:
    - python
    - gsl
    - fftw
    - dsdp
    - glpk
    - suitesparse

test:
  source_files:
    # examples are required to run tests
    - tests/*
    - examples/*
  requires:
    - pytest
    - pip
  commands:
    - pip check
    - pytest -vv tests

about:
  home: https://cvxopt.org
  license: GPL-3.0-or-later
  license_file: LICENSE
  license_family: GPL
  summary: Convex optimization package
  description: |
    Python Software for Convex Optimization
  doc_url: https://cvxopt.org/userguide
  dev_url: https://github.com/cvxopt/cvxopt

extra:
  recipe-maintainers:
    - jakirkham
    - jjhelmus
    - martinandersen
